name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push PHP-FPM
        uses: docker/build-push-action@v6
        with:
          context: .
          file: php-fpm/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            svrforum/ds-php-fpm:8.5
            svrforum/ds-php-fpm:latest
            svrforum/ds-php-fpm:${{ steps.version.outputs.tag }}

      - name: Build and push Nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            svrforum/ds-nginx:1.28
            svrforum/ds-nginx:latest
            svrforum/ds-nginx:${{ steps.version.outputs.tag }}
